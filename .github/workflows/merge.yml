name: Merge Rules

on:
  schedule:
    # Run daily at UTC 22:00
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run merge script
        run: python merge_rules.py

      - name: Switch to release branch (create if missing)
        shell: bash
        run: |
          set -euo pipefail

          # 检查远端是否已有 release 分支
          if git ls-remote --heads origin release | grep -q 'refs/heads/release'; then
            git checkout -B release origin/release
          else
            # 创建孤儿分支（无历史）
            git checkout --orphan release
            # 清空索引中的文件（工作区保留）
            git rm -rf . >/dev/null 2>&1 || true
          fi

          # 将产物放到仓库根目录
          cp -f output/direct-domain.txt ./direct-domain.txt
          cp -f output/proxy-domain.txt ./proxy-domain.txt
          cp -f output/direct-ip-v4.txt ./direct-ip-v4.txt
          cp -f output/direct-ip-v6.txt ./direct-ip-v6.txt

          git add direct-domain.txt proxy-domain.txt direct-ip-v4.txt direct-ip-v6.txt

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update merged rules $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin release

      - name: Purge jsdelivr CDN
        run: |
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/direct-domain.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/proxy-domain.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/direct-ip-v4.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/direct-ip-v6.txt"
