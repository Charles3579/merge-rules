# Rule merge configuration
# Each rule type has a list of sources and an optional exclusion list.
# Sources are URLs to download rule files from.
# Exclusions are exact-match entries to remove from the final merged output.

rules:
  proxy-domain:
    type: domain
    sources:
      - https://raw.githubusercontent.com/Charles3579/proxy-rules/refs/heads/release/proxy-domain.txt
      - https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/refs/heads/release/gfw.txt
    exclusions: []

